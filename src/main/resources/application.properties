# ==================== APPLICATION ====================
spring.application.name=SmsGateway
# Le profil actif vient TOUJOURS de la variable d'environnement injectée par Docker Compose.
# "dev" n'est qu'un fallback pour une exécution locale sans docker-compose.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ==================== SERVER ====================
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api

# ==================== JPA / JACKSON ====================
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# ==================== LOGGING ====================
logging.level.root=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ==================== SWAGGER / OPENAPI ====================
# Configuration commune à tous les profils. L'activation/désactivation effective
# (enabled=true/false) se décide UNIQUEMENT dans application-{profil}.properties
# (voir application-dev / -preprod / -prod), jamais ici.

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.show-extensions=true
springdoc.swagger-ui.show-common-extensions=true

springdoc.api-docs.path=/v3/api-docs
springdoc.packages-to-scan=TNB.SmsGateway.controller
springdoc.paths-to-match=/v1/**

# Groupes de endpoints — chaque groupe liste explicitement SA racine ET ses sous-routes.
# Piège Ant path matching : "/v1/devices/**" NE matche PAS "/v1/devices" lui-même
# (il faut un segment après le "/"), d'où la virgule sur chaque ligne ci-dessous.

springdoc.group-configs[0].group=auth
springdoc.group-configs[0].paths-to-match=/v1/auth, /v1/auth/**

springdoc.group-configs[1].group=webhook
springdoc.group-configs[1].paths-to-match=/v1/webhook, /v1/webhook/**

springdoc.group-configs[2].group=api-keys
springdoc.group-configs[2].paths-to-match=/v1/api-keys, /v1/api-keys/**

springdoc.group-configs[3].group=devices
springdoc.group-configs[3].paths-to-match=/v1/devices, /v1/devices/**

springdoc.group-configs[4].group=messages
springdoc.group-configs[4].paths-to-match=/v1/messages, /v1/messages/**

springdoc.group-configs[5].group=coverage
springdoc.group-configs[5].paths-to-match=/v1/coverage, /v1/coverage/**

springdoc.group-configs[6].group=reference
springdoc.group-configs[6].paths-to-match=/v1/reference, /v1/reference/**

springdoc.group-configs[7].group=health
springdoc.group-configs[7].paths-to-match=/v1/health, /v1/health/**

springdoc.cache.disabled=false
# ==================== APPLICATION ====================
spring.application.name=SmsGateway
# The active profile ALWAYS comes from the environment variable injected by Docker Compose.
# "dev" is only a fallback for local execution without docker-compose.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ==================== SERVER ====================
server.port=${SERVER_PORT:8070}
server.servlet.context-path=/api

# ==================== JPA / JACKSON ====================
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# ==================== LOGGING ====================
logging.level.root=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ==================== SWAGGER / OPENAPI ====================
# Common configuration for all profiles. The actual enable/disable
# (enabled=true/false) is decided ONLY in application-{profile}.properties
# (see application-dev / -preprod / -prod), never here.

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.show-extensions=true
springdoc.swagger-ui.show-common-extensions=true

springdoc.api-docs.path=/v3/api-docs
springdoc.packages-to-scan=TNB.SmsGateway.controller
springdoc.paths-to-match=/v1/**

# Endpoint groups ? each group explicitly lists ITS root AND its sub-routes.
# Ant path matching pitfall: "/v1/devices/**" does NOT match "/v1/devices" itself
# (it requires a segment after "/"), hence the comma on each line below.

springdoc.group-configs[0].group=auth
springdoc.group-configs[0].paths-to-match=/v1/auth, /v1/auth/**

springdoc.group-configs[1].group=webhook
springdoc.group-configs[1].paths-to-match=/v1/webhook, /v1/webhook/**

springdoc.group-configs[2].group=api-keys
springdoc.group-configs[2].paths-to-match=/v1/api-keys, /v1/api-keys/**

springdoc.group-configs[3].group=devices
springdoc.group-configs[3].paths-to-match=/v1/devices, /v1/devices/**

springdoc.group-configs[4].group=messages
springdoc.group-configs[4].paths-to-match=/v1/messages, /v1/messages/**

springdoc.group-configs[5].group=coverage
springdoc.group-configs[5].paths-to-match=/v1/coverage, /v1/coverage/**

springdoc.group-configs[6].group=reference
springdoc.group-configs[6].paths-to-match=/v1/reference, /v1/reference/**

springdoc.group-configs[7].group=health
springdoc.group-configs[7].paths-to-match=/v1/health, /v1/health/**

springdoc.cache.disabled=false

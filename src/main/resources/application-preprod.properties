# ==================== PREPROD ====================
server.tomcat.max-threads=50
server.tomcat.connection-timeout=15000

# Database - fully parameterized, NO hardcoded hostname
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=5


# JPA - schema never auto-modified, Flyway is the single source of truth
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.flyway.enabled=true

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Mail
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

# Logging - actual project package
logging.level.TNB.SmsGateway=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate=WARN

# Monitoring
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Swagger - disabled in preprod (choice kept exactly from your version, see remark at the end of the response)
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false
springdoc.packages-to-scan=TNB.SmsGateway.controller

# Server
server.port=8080
server.tomcat.max-threads=50
server.tomcat.connection-timeout=15000

# Database
spring.datasource.url=jdbc:postgresql://postgres-preprod:5432/tnb_sms_preprod
spring.datasource.username=${DB_USERNAME:preprod_user}
spring.datasource.password=${DB_PASSWORD:preprod_pass}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=5

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20

# JWT
jwt.secret=${JWT_SECRET:preprodJwtSecretKey12345678901234567890}
jwt.expiration=43200000

# Mail
spring.mail.host=${MAIL_HOST:smtp.sendgrid.net}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:preprod_user}
spring.mail.password=${MAIL_PASSWORD:preprod_pass}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

# Logging
logging.level.com.tnb=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate=WARN

# Monitoring
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Swagger (disabled in preprod)
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
# ==================== DEV ====================
# NB : server.port et le bloc springdoc commun (path, enabled par défaut) sont déjà
# posés dans application.properties — pas de redéfinition ici, sauf ce qui change réellement.

# Database — paramétré via env vars (fallback localhost pour exécution hors Docker)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tnb_sms_dev}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT — nom de propriété harmonisé (jwt.expiration-ms) et durée alignée sur la décision retenue (24h)
jwt.secret=${JWT_SECRET:devSecretKey12345678901234567890123456789012}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Mail — attrape-mail local par défaut (ex: Mailpit/MailHog via docker-compose),
# pas de TLS/auth nécessaire en dev. Surchargeable via env si besoin de tester un vrai SMTP.
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_TLS:false}
spring.mail.properties.mail.smtp.connectiontimeout=5000

# Redis — utilisé pour le rate limiting OTP et le cache de validation ApiKey
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Logging — package réel du projet, PAS "com.tnb" (piège déjà rencontré sur TNB Switch)
logging.level.TNB.SmsGateway=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Swagger — activation explicite en dev (le path/défaut vient du fichier commun)
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.packages-to-scan=TNB.SmsGateway.controller
# ==================== DEV ====================
# NB: server.port and the common springdoc block (path, enabled by default) are already
# defined in application.properties - no redefinition here, except for what actually changes.

# Database - configured via env vars (fallback localhost for execution outside Docker)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tnb_sms_dev}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT - harmonized property name (jwt.expiration-ms) and duration aligned with chosen decision (24h)
jwt.secret=${JWT_SECRET:devSecretKey12345678901234567890123456789012}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
# Mail - local mail catcher by default (e.g., Mailpit/MailHog via docker-compose),
# no TLS/auth required in dev. Overridable via env if testing a real SMTP is needed.
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_TLS:false}
spring.mail.properties.mail.smtp.connectiontimeout=5000


# Logging - actual project package, NOT "com.tnb" (pitfall already encountered on TNB Switch)
logging.level.TNB.SmsGateway=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Swagger - explicit activation in dev (path/default comes from the common file)
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.packages-to-scan=TNB.SmsGateway.controller
